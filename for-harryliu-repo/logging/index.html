<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>穹顶洞察 · 测井行业技术情报</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #0a1628 0%, #1a365d 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #e2e8f0;
            padding: 2rem;
        }
        .container {
            max-width: 800px;
            text-align: center;
        }
        .logo {
            font-size: 4rem;
            margin-bottom: 1rem;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #e2e8f0 0%, #ecc94b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        p {
            font-size: 1.25rem;
            color: #a0aec0;
            margin-bottom: 2rem;
            line-height: 1.6;
        }
        .btn {
            display: inline-block;
            padding: 1rem 2rem;
            background: linear-gradient(135deg, #3182ce 0%, #2c5282 100%);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 1.125rem;
            font-weight: 600;
            transition: all 0.3s ease;
            border: 1px solid rgba(49, 130, 206, 0.3);
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
            background: linear-gradient(135deg, #4299e1 0%, #3182ce 100%);
        }
        .stats {
            display: flex;
            justify-content: center;
            gap: 3rem;
            margin-top: 3rem;
        }
        .stat {
            text-align: center;
        }
        .stat-number {
            font-size: 2rem;
            font-weight: 800;
            color: #d69e2e;
            display: block;
        }
        .stat-label {
            font-size: 0.875rem;
            color: #718096;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🛢️</div>
        <h1>穹顶洞察 · 测井行业技术情报</h1>
        <p>每日追踪全球石油测井领域前沿动态<br>汇聚行业最新技术突破与市场趋势</p>
        <a href="https://harryfhliu.github.io/logging" class="btn">进入测井简报站 →</a>
        
        <div class="stats">
            <div class="stat">
                <span class="stat-number">1+</span>
                <span class="stat-label">期简报</span>
            </div>
            <div class="stat">
                <span class="stat-number">12</span>
                <span class="stat-label">技术分类</span>
            </div>
            <div class="stat">
                <span class="stat-number">50+</span>
                <span class="stat-label">关注企业</span>
            </div>
        </div>
    </div>
</body>
</html>
